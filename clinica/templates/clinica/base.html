<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{% block title %}Apex Core | HealthFlow PRO{% endblock %}</title>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-900 text-white p-4 shadow-lg mb-8">
        <div class="container mx-auto flex justify-between">
            <a href="{% url 'index' %}" class="font-bold text-xl flex items-center hover:text-blue-200 transition">
                <span class="font-bold text-xl">HealthFlow Pro</span>
            </a>
            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                <span class="text-sm text-blue-200">
                    Bem-vindo, <strong>{{ user.username|capfirst}}</strong>
                </span>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                <button type="submit" class="text-xs bg-red-500/20 hover:bg-red-500 text-red-200 px-2 py-1 rounded transition">
                    Sair
                </button>
                </form>
                {% else %}
                    <a href="{% url 'login' %}" class="text-sm bg-green-600 hover:bg-green-700 px-3 py-1 rounded">
                        Entrar
                    </a>
                {% endif %}
            </div>
            <div class="space-x-4">
                <a href="{% url 'listar_medicos' %}" class="hover:no-underline">Médicos</a>
                <a href="{% url 'agenda' %}" class="hover:no-underline">Agenda</a>
                <a href="{% url 'novo_agendamento' %}" class="bg-blue-600 px-3 py-1 rounded">Novo Agendamento</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto">
        <!--Bloco de mansagens-->
        {% if message%}
            <div class='container mx-auto mt-4'>
                {% for message in messages %}
                    <div class = 'p-4 rounded-md {% if message.tags == 'success' %}bg-green-100 text-green-800 border-l-4 border-green-500{% else %}bg-red-100 text-red-800 border-l-4 border-red-500{% endif %} mb-4'>
                        {{message}}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}
        <!-- O conteúdo das outras páginas entrará aqui -->
        {% endblock %}
    </main>
</body>
</html>
