{% extends 'clinica/base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md border-t-4 border-red-500 mt-10">
    <h2 class="text-2xl font-bold mb-4 text-red-600">⚠️ Confirmar Cancelamento</h2>
    <p class="text-gray-700 mb-6">
        Você tem certeza que deseja excluir permanentemente a consulta de 
        <strong>{{ consulta.paciente_nome }}</strong> agendada para 
        <strong>{{ consulta.data_hora|date:"d/m/Y H:i" }}</strong>?
    </p>
    
    <form method="post">
        {% csrf_token %}
        <div class="flex space-x-4">
            <button type="submit" class="flex-1 bg-red-600 text-white py-2 rounded font-semibold hover:bg-red-700 transition">
                Sim, Cancelar
            </button>
            <a href="{% url 'agenda' %}" class="flex-1 text-center bg-gray-200 text-gray-800 py-2 rounded font-semibold hover:bg-gray-300 transition">
                Voltar
            </a>
        </div>
    </form>
</div>
{% endblock %}
